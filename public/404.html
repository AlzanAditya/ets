<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Redirect script for Single Page Application routing on GitHub Pages
      var path = window.location.pathname;
      var base = "/";
      
      if (path.includes("/experimental/qr-react3/")) {
        base = "/experimental/qr-react3/";
      }
      
      // Redirect to the main dashboard fallback
      window.location.replace(base + "dashboard");
    </script>
  </head>
  <body>
    <p>Redirecting to dashboard...</p>
  </body>
</html>
